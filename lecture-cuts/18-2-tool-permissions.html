<main class="slide"><section class="copy"><div class="eyebrow">Tool 권한</div><h2>에이전트 도구는 권한과 개수를 좁혀야 합니다</h2><p class="subtitle">도구를 쥐여주는 순간, 읽기와 쓰기 권한이 실제 운영 위험이 됩니다.</p><ul class="bullets"><li>read-only는 조사와 근거 수집에 적합합니다.</li><li>write-capable은 승인과 검증 게이트가 필요합니다.</li><li>비슷한 도구가 많으면 선택 비용과 오작동 위험이 커집니다.</li></ul><div class="note"><strong>발표 포인트</strong>에이전트에게 도구를 쥐여줄 때는 권한 범위와 도구 개수를 먼저 좁혀야 합니다.</div></section><section class="slide-media"><div class="css-visual expand-compare-visual" aria-label="Agent tool permission and bloat comparison"><div class="compare-card good"><strong>Narrow</strong><span>read / write 분리</span></div><div class="compare-arrow">vs</div><div class="compare-card bad"><strong>Bloat</strong><span>도구 과다</span></div></div></section></main>
