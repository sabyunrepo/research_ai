<main class="slide"><section class="copy"><div class="eyebrow">0:15-0:17</div><h2>LLM은 빈칸을 추론으로 채웁니다</h2><p class="subtitle">문제가 되는 순간은 모델이 모를 때가 아니라, 모르는 것을 그럴듯하게 메울 때입니다.</p><ul class="bullets"><li>보이는 파일과 규칙만 기준으로 판단합니다.</li><li>도구 피드백이 없으면 성공 여부를 추정합니다.</li><li>검증 압력이 낮으면 빠른 완료를 택합니다.</li></ul><div class="note"><strong>핵심 설명</strong>실패는 모델 지능 하나가 아니라 작업 환경에서 생기는 압력의 결과로 설명합니다.</div></section><section class="slide-media"><div class="css-visual failure-system-visual" aria-label="LLM 실패를 만드는 네 가지 압력"><div class="failure-core">LLM</div><div class="failure-force context">보이는<br>맥락</div><div class="failure-force priority">지시<br>우선순위</div><div class="failure-force tools">도구<br>피드백</div><div class="failure-force verify">검증<br>압력</div><div class="failure-output">그럴듯한 추론</div></div></section></main>
