<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>작업 성격에 따라 요청 강도를 조절합니다</title><link rel="stylesheet" href="assets/style.css"></head><body>
<main class="slide"><section class="copy"><div class="eyebrow">07</div><h2>작업 성격에 따라 요청 강도를 조절합니다</h2><p class="subtitle">모든 요청에 예시, 계획, 검증을 똑같이 붙일 필요는 없습니다.</p><ul class="bullets"><li>간단한 일은 목표만 선명하면 충분합니다.</li><li>형식이 중요한 일은 예시를 붙입니다.</li><li>위험한 일은 검증 목록과 보고 기준을 붙입니다.</li></ul><div class="note"><strong>발표 포인트</strong>요청을 무겁게 만드는 것이 목표가 아니라, 작업 위험에 맞게 필요한 기준만 붙이는 것이 목표입니다.</div></section><section class="slide-media"><div class="css-visual expand-matrix-visual" aria-label="매트릭스 시각자료"><div class="matrix-cell accent">간단: 목표만</div><div class="matrix-cell ">형식 중요: 예시 추가</div><div class="matrix-cell ">위험: 검증 목록</div><div class="matrix-cell accent">불확실: 질문 또는 조사</div></div></section></main>
