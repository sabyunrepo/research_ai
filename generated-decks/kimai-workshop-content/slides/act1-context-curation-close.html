<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>컨텍스트 정리는 책상에 올릴 것과 치울 것을 정하는 일입니다.</title>
  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>
  <main class="slide slide--checklist slide-template--decision-gate" data-slide-id="act1-context-curation-close" data-layout-template="checklist" data-main-template="decision-gate" data-teaching-move="demonstrate" data-audience-action="rehearse-checklist" data-visual-mode="checklist-board" data-evidence-ids="claim-002 claim-004" data-glossary-terms="Context">
    <section class="copy">
      <div class="eyebrow">Act 1 · 책상 정리</div>
      <h2>컨텍스트 정리는 책상에 올릴 것과 치울 것을 정하는 일입니다.</h2>
      <p class="message">Context Curation은 이번 작업에 바로 쓸 자료, 옆에 둘 자료, 치울 자료를 정하는 일입니다.</p>
      <div class="source-anchor-parity" hidden><span>바로 쓸 자료</span><span>옆에 둘 자료</span><span>치울 자료</span></div>
      
      <footer class="slide-bridge"><span class="slide-bridge-label">다음</span><span>첫 실습은 김아이 책상을 직접 정리하는 일입니다.</span></footer>
    </section>
    <section class="slide-media" aria-label="Act 0의 보고서 빈칸 장면을 작게 회수하는 손그림">
      <div class="lc-visual lc-decision-gate-visual" data-template-component="decision-gate" data-visual-component="gate" data-source-component="practice-gate-visual" data-motion-cue="gate-check" aria-hidden="true">
          <div class="lc-gate-board">
            <strong>확인?</strong>
            <span class="gate-line"></span>
            <em>증거 확인 후 판정</em>
          </div>
          <span class="lc-gate-card goal">바로 쓸 자료<br><small>맞음</small></span>
          <span class="lc-gate-card evidence">옆에 둘 자료<br><small>있음</small></span>
          <span class="lc-gate-card retry">치울 자료<br><small>필요</small></span>
          <div class="lc-gate-verdict"><b>HOLD</b><b>PASS</b></div>
      </div>
    </section>
  </main>
</body>
</html>
