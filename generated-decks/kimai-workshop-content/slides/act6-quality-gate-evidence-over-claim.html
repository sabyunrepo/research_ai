<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <base href="/">
  <title>품질검문소는 완료 보고 대신 증거를 봅니다.</title>
  <link rel="stylesheet" href="../assets/style.css">
  <script defer src="../assets/slides.js"></script>
  <script defer src="../assets/glossary-tooltips.js"></script>
</head>
<body>
  <main class="slide slide--checklist slide-template--decision-gate" data-slide-id="act6-quality-gate-evidence-over-claim" data-layout-template="checklist" data-main-template="decision-gate" data-teaching-move="demonstrate" data-audience-action="rehearse-checklist" data-visual-mode="checklist-board" data-evidence-ids="claim-001" data-glossary-terms="Quality Gate">
    <section class="copy">
      <div class="eyebrow">Act 6 · 검증과 하네스 구조</div>
      <h2>품질검문소는 완료 보고 대신 증거를 봅니다.</h2>
      <p class="message">세 가지 증거의 전체 지도를 짧게 제시하고, 상세 설명은 63~65번에서 나눠 다룹니다.</p>
      <div class="source-anchor-parity" hidden><span>작업 기록</span><span>기준 대조</span><span>남은 위험</span></div>
      
      
    </section>
    <section class="slide-media" aria-label="품질검문소는 완료 보고 대신 증거를 봅니다. 장면을 설명하는 hand-drawn minimal teaching asset">
      <div class="lc-visual lc-decision-gate-visual" data-template-component="decision-gate" data-visual-component="gate" data-source-component="practice-gate-visual" data-motion-cue="gate-check" aria-hidden="true">
          <div class="lc-gate-board">
            <strong>확인?</strong>
            <span class="gate-line"></span>
            <em>증거 확인 후 판정</em>
          </div>
          <span class="lc-gate-card goal">작업 기록<br><small>맞음</small></span>
          <span class="lc-gate-card evidence">오해한 기준<br><small>있음</small></span>
          <span class="lc-gate-card retry">남은 위험<br><small>필요</small></span>
          <div class="lc-gate-verdict"><b>HOLD</b><b>PASS</b></div>
      </div>
    </section>
  </main>
