<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">

  <title>먼저 이 일을 매뉴얼로 만들 가치가 있는지 따집니다.</title>

<body>
  <main class="slide slide--checklist slide-template--decision-gate" data-slide-id="act4-manual-candidate-check" data-layout-template="checklist" data-main-template="decision-gate" data-teaching-move="demonstrate" data-audience-action="rehearse-checklist" data-visual-mode="checklist-board" data-evidence-ids="claim-001" data-glossary-terms="Skill">
    <section class="copy">
      <div class="eyebrow">Act 4 · 반복 업무 매뉴얼</div>
      <h2>먼저 이 일을 매뉴얼로 만들 가치가 있는지 따집니다.</h2>
      <p class="message">자주 반복되고, 같은 기준이 필요하고, 실수 비용이 큰 일만 매뉴얼 후보입니다.</p>
      <div class="source-anchor-parity" hidden><span>자주 반복되는 일</span><span>같은 기준이 필요한 일</span><span>실수 비용이 큰 일</span></div>
      
      
    </section>
    <section class="slide-media" aria-label="먼저 이 일을 매뉴얼로 만들 가치가 있는지 따집니다. 장면을 설명하는 hand-drawn minimal teaching asset">
      <div class="lc-visual lc-decision-gate-visual" data-template-component="decision-gate" data-visual-component="gate" data-source-component="practice-gate-visual" data-motion-cue="gate-check" aria-hidden="true">
          <div class="lc-gate-board">
            <strong>확인?</strong>
            <span class="gate-line"></span>
            <em>증거 확인 후 판정</em>
          </div>
          <span class="lc-gate-card goal">자주 반복되는 일<br><small>맞음</small></span>
          <span class="lc-gate-card evidence">오해한 기준<br><small>있음</small></span>
          <span class="lc-gate-card retry">실수 비용이 큰<br><small>필요</small></span>
          <div class="lc-gate-verdict"><b>HOLD</b><b>PASS</b></div>
      </div>
    </section>
  </main>
