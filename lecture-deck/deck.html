<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML/CSS Deck Automation Harness v1</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <main class="deck-shell">
    <header class="deck-topbar">
      <div>
        <strong>HTML/CSS Deck Automation Harness v1</strong>
        <div class="deck-status" id="deckStatus">Loading deck</div>
      </div>
      <nav class="deck-actions" aria-label="Deck actions">
        <a href="presenter-review.html">Presenter Review</a>
        <button type="button" id="printDeck">Print</button>
      </nav>
    </header>
    <section class="deck-stage" aria-label="Slide deck">
      <button class="deck-nav" type="button" id="previousSlide" aria-label="Previous slide">‹</button>
      <div class="deck-strip" id="deck"></div>
      <button class="deck-nav" type="button" id="nextSlide" aria-label="Next slide">›</button>
    </section>
  </main>
  <script src="assets/slides.js"></script>
  <script src="assets/deck.js"></script>
</body>
</html>
