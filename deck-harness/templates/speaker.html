<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Generated Deck Speaker Console</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    .practice-status-modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background: rgba(23, 23, 23, .45);
      padding: 24px;
    }
    .practice-status-modal[hidden] { display: none; }
    .practice-status-dialog {
      width: min(1120px, 100%);
      max-height: min(780px, calc(100vh - 48px));
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid #171717;
      border-radius: 8px;
      background: #fffdf7;
      color: #171717;
      box-shadow: 0 20px 70px rgba(23, 23, 23, .24);
    }
    .practice-status-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 16px;
      border-bottom: 1px solid #171717;
    }
    .practice-status-head h2 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .practice-status-head p { margin: 4px 0 0; color: #59524a; font-weight: 800; }
    .practice-status-body {
      overflow: auto;
      display: grid;
      gap: 12px;
      padding: 16px;
    }
    .practice-status-row {
      display: grid;
      grid-template-columns: 1fr .9fr .6fr .9fr;
      gap: 10px;
      align-items: start;
      border: 1px solid #171717;
      border-radius: 8px;
      background: #fff;
      padding: 12px;
    }
    .practice-status-row strong,
    .practice-status-row span,
    .practice-status-row small { display: block; }
    .practice-status-row small { color: #59524a; font-weight: 800; line-height: 1.35; }
    .practice-attempt-log {
      grid-column: 1 / -1;
      margin: 0;
      padding-left: 18px;
      color: #3d332a;
      font-weight: 800;
      line-height: 1.45;
    }
  </style>
  <script defer src="assets/slides.js"></script>
  <script defer src="assets/speaker.js"></script>
</head>
<body class="speaker-page">
  <header class="speaker-toolbar">
    <div>
      <p class="deck-kicker">Speaker Console</p>
      <h1>발표자 콘솔</h1>
      <p class="deck-subtitle" id="speakerStatus">현재 슬라이드와 발표 스크립트를 불러오는 중입니다.</p>
    </div>
    <section class="speaker-topbar-status" aria-label="Current slide and timers">
      <div class="speaker-topbar-current">
        <p>현재 슬라이드</p>
        <strong id="currentSlideLabel">-- / --</strong>
        <h2 id="currentSlideTitle">불러오는 중입니다.</h2>
      </div>
      <div class="speaker-topbar-timers" aria-label="Presentation timers">
        <div class="speaker-topbar-timer">
          <small>총 강의시간</small>
          <span id="speakerTotalTimer">00:00</span>
        </div>
        <div class="speaker-topbar-timer">
          <small>슬라이드별 시간</small>
          <span id="speakerSlideTimer">00:00</span>
        </div>
      </div>
      <small id="speakerSyncStatus">동기화 준비 중</small>
    </section>
    <nav class="deck-actions" aria-label="Speaker actions">
      <a href="/">메인</a>
      <a href="deck.html" target="_blank" rel="noreferrer">발표 화면</a>
      <a href="audience.html" target="_blank" rel="noreferrer">청강자 화면</a>
      <a href="presenter-review.html">검토/수정</a>
      <button type="button" id="practiceStatusToggle">실습현황</button>
      <button type="button" id="timerToggle">Start</button>
      <button type="button" id="timerReset">Reset</button>
    </nav>
  </header>

  <main class="speaker-console">
    <section class="speaker-reference-column" aria-label="Slide and script reference">
      <section class="speaker-preview-panel speaker-next-panel" aria-label="Current slide">
        <div class="speaker-panel-header">
          <span>현재 슬라이드</span>
          <strong id="currentPreviewLabel">-- / --</strong>
        </div>
        <iframe id="currentSlideFrame" class="speaker-slide-frame" title="현재 슬라이드"></iframe>
      </section>

      <aside class="speaker-notes-panel">
        <section class="speaker-prompt" aria-label="Presenter prompt">
          <p class="review-meta" id="speakerMeta"></p>
          <h2 id="speakerPromptTitle"></h2>
          <div id="speakerPromptBody" class="speaker-prompt-body"></div>
        </section>
      </aside>
    </section>

    <section class="speaker-outline-panel" aria-label="Keyword outline">
      <div class="speaker-controls speaker-outline-controls" aria-label="Slide controls">
        <button type="button" id="speakerPrevious">이전</button>
        <button type="button" id="speakerNext">다음</button>
      </div>
      <div class="speaker-panel-header">
        <span>키워드 아웃라인</span>
        <strong>원고 없이 말하기</strong>
      </div>
      <div id="speakerCuePanel" class="speaker-cues"></div>
    </section>
  </main>
  <section id="practiceStatusModal" class="practice-status-modal" hidden aria-label="실습현황">
    <div class="practice-status-dialog" role="dialog" aria-modal="true" aria-labelledby="practiceStatusTitle">
      <header class="practice-status-head">
        <div>
          <h2 id="practiceStatusTitle">실습현황</h2>
          <p id="practiceStatusMeta">불러오는 중입니다.</p>
        </div>
        <button type="button" id="practiceStatusClose">닫기</button>
      </header>
      <div id="practiceStatusBody" class="practice-status-body"></div>
    </div>
  </section>
</body>
</html>
